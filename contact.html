<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Devendra | Contact</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    background:#f4f6f9;
}

/* Page header */
.page-header {
    background: linear-gradient(135deg,#4facfe,#00f2fe);
    color:white;
    padding:60px 20px;
    text-align:center;
}

/* Contact form */
.contact-form {
    background:white;
    border-radius:12px;
    padding:30px;
    box-shadow:0 10px 20px rgba(0,0,0,0.1);
}

.contact-form h2 {
    color:#1f3a5f;
    margin-bottom:20px;
    font-weight:bold;
}

.contact-form label {
    font-weight:500;
}

.contact-form .btn {
    background:#4facfe;
    border:none;
    color:white;
}

.contact-form .btn:hover {
    background:#00f2fe;
    color:white;
}

/* Footer */
footer {
    background:#111;
    color:#ccc;
}
</style>
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-light bg-white shadow">
  <div class="container">
    <a class="navbar-brand fw-bold" href="index.html">Devendra</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menu">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="menu">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
        <li class="nav-item"><a class="nav-link" href="project.html">Projects</a></li>
        <li class="nav-item"><a class="nav-link" href="videoDemo.html">Video Demo</a></li>
        <li class="nav-item"><a class="nav-link active" href="contact.html">Contact</a></li>
        <li class="nav-item"><a class="nav-link" href="report.html">Report</a></li>
      </ul>
    </div>
  </div>
</nav>

<!-- Page Header -->
<section class="page-header">
  <div class="container">
    <h1>Contact Me</h1>
    <p>Feel free to reach out for collaboration, feedback, or any questions.</p>
  </div>
</section>

<!-- Contact Form Section -->
<section class="container py-5">
  <div class="row justify-content-center">
    <div class="col-12 col-md-8 col-lg-6">
      <div class="contact-form">
        <h2>Get in Touch</h2>
        <form action="#" method="POST">
          <div class="mb-3">
            <label for="name" class="form-label">Name</label>
            <input type="text" class="form-control" id="name" name="name" placeholder="Your Name" required>
          </div>
          <div class="mb-3">
            <label for="email" class="form-label">Email</label>
            <input type="email" class="form-control" id="email" name="email" placeholder="Your Email" required>
          </div>
          <div class="mb-3">
            <label for="subject" class="form-label">Subject</label>
            <input type="text" class="form-control" id="subject" name="subject" placeholder="Subject" required>
          </div>
          <div class="mb-3">
            <label for="message" class="form-label">Message</label>
            <textarea class="form-control" id="message" name="message" rows="5" placeholder="Write your message here..." required></textarea>
          </div>
          <button type="submit" class="btn w-100">Send Message</button>
        </form>
      </div>
    </div>
  </div>
</section>

<!-- Footer -->
<footer class="text-center py-4">
  <p>© Devendra Portfolio | Web Development Learning Journey</p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
